<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Binder — package manager</title>
<style>
  :root { --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --border:#30363d; --text:#e6edf3; --dim:#8b949e; --accent:#58a6ff; --green:#3fb950; --red:#f85149; --orange:#d29922; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 0; min-height: 100vh; line-height: 1.5; }
  header { padding: 18px 22px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 14px; position: sticky; top: 0; }
  header h1 { font-size: 16px; font-weight: 700; }
  header .sub { color: var(--dim); font-size: 11px; font-family: ui-monospace, monospace; }
  header .actions { margin-left: auto; display: flex; gap: 8px; }
  button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 7px; cursor: pointer; font: inherit; font-size: 12px; }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.danger  { color: var(--red); border-color: rgba(248,81,73,.3); }
  main { padding: 18px 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; max-width: 1200px; margin: 0 auto; }
  @media (max-width: 760px) { main { grid-template-columns: 1fr; } }
  section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--dim); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  section h2 .count { font-family: ui-monospace, monospace; color: var(--text); }
  .row { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
  .row.installed { border-left: 3px solid var(--green); }
  .row .head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .row .name { font-weight: 700; font-size: 13px; }
  .row .pub { font-size: 10px; color: var(--dim); font-family: ui-monospace, monospace; }
  .row .ver { font-size: 10px; color: var(--dim); font-family: ui-monospace, monospace; }
  .row .summary { font-size: 12px; color: var(--dim); margin: 6px 0 10px; line-height: 1.5; }
  .row .pills { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .pill { font-size: 9px; padding: 1px 7px; border-radius: 999px; text-transform: uppercase; letter-spacing: .5px; font-weight: 700; font-family: ui-monospace, monospace; }
  .pill.cat { background: rgba(88,166,255,.13); color: var(--accent); }
  .pill.ui  { background: rgba(247,120,186,.13); color: #f778ba; }
  .pill.svc { background: rgba(63,185,80,.13);  color: var(--green); }
  .pill.eggs{ background: rgba(188,140,255,.13); color: #bc8cff; }
  .row .actions { display: flex; gap: 6px; }
  .empty { color: var(--dim); padding: 20px 8px; text-align: center; font-size: 12px; }
  .toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 9px 16px; font-size: 12px; opacity: 0; transition: opacity .25s; }
  .toast.show { opacity: 1; }
  .toast.ok  { border-color: var(--green); }
  .toast.err { border-color: var(--red); }
  .ctx-banner { padding: 9px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: 11px; color: var(--dim); }
  .ctx-banner code { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div>
    <h1>📒 Binder</h1>
    <div class="sub">install · uninstall · browse · the rapp store</div>
  </div>
  <div class="actions">
    <button onclick="reload()">↻ Reload</button>
  </div>
</header>

<div class="ctx-banner" id="ctxBanner"></div>

<main>
  <section>
    <h2>Installed <span class="count" id="installedCount">0</span></h2>
    <div id="installed"><div class="empty">Loading…</div></div>
  </section>
  <section>
    <h2>Catalog <span class="count" id="catalogCount">0</span></h2>
    <div id="catalog"><div class="empty">Loading…</div></div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ─── Cartridge context (parent vBrainstem injects on load) ──────────────
let cartridge = null;
window.addEventListener('message', (ev) => {
  const d = ev.data;
  if (!d || typeof d !== 'object') return;
  if (d.type === 'rapp:cartridge') {
    cartridge = d;
    onCartridge();
  }
});
window.parent.postMessage({ type: 'rapp:get_cartridge' }, '*');

function onCartridge() {
  const banner = document.getElementById('ctxBanner');
  const tether = cartridge?.context?.tether;
  const user = cartridge?.context?.user;
  const parts = [];
  if (user) parts.push(`signed in as <code>@${user.login}</code>`);
  if (tether?.active) parts.push(`tethered to <code>${tether.base}</code>`);
  else parts.push(`cloud mode (vBrainstem)`);
  banner.innerHTML = parts.join(' · ');
}

// ─── HTTP through the parent's fetch shim (works in tether + cloud) ─────
async function api(path, init) {
  const r = await fetch(path, init || {});
  if (!r.ok) {
    const t = await r.text().catch(() => '');
    throw new Error(`HTTP ${r.status}${t ? ': ' + t.slice(0, 200) : ''}`);
  }
  return r.json();
}

// ─── State + render ─────────────────────────────────────────────────────
let CATALOG = null;
let BINDER  = null;

async function reload() {
  await Promise.all([loadInstalled(), loadCatalog()]);
}
async function loadInstalled() {
  try { BINDER = await api('/api/binder'); }
  catch (e) { BINDER = { error: e.message }; }
  renderInstalled();
}
async function loadCatalog() {
  try { CATALOG = await api('/api/binder/catalog'); }
  catch (e) { CATALOG = { error: e.message }; }
  renderCatalog();
}

function renderInstalled() {
  const list = (BINDER && BINDER.installed) || [];
  document.getElementById('installedCount').textContent = list.length;
  const root = document.getElementById('installed');
  if (BINDER?.error) {
    root.innerHTML = `<div class="empty">${esc(BINDER.error)}</div>`;
    return;
  }
  if (!list.length) { root.innerHTML = `<div class="empty">Nothing installed yet.</div>`; return; }
  root.innerHTML = list.map(e => `
    <div class="row installed">
      <div class="head">
        <span class="name">${esc(e.id)}</span>
        <span class="ver">v${esc(e.version || '?')}</span>
      </div>
      <div class="pills">
        <span class="pill svc">installed</span>
      </div>
      <div class="actions">
        <button class="danger" onclick='uninstall(${JSON.stringify(e.id)})'>Uninstall</button>
      </div>
    </div>
  `).join('');
}

function renderCatalog() {
  const list = (CATALOG && CATALOG.rapplications) || [];
  document.getElementById('catalogCount').textContent = list.length;
  const root = document.getElementById('catalog');
  if (CATALOG?.error) {
    root.innerHTML = `<div class="empty">${esc(CATALOG.error)}</div>`;
    return;
  }
  if (!list.length) { root.innerHTML = `<div class="empty">Catalog is empty.</div>`; return; }
  const installedIds = new Set(((BINDER && BINDER.installed) || []).map(e => e.id));
  root.innerHTML = list.map(r => {
    const surfaces = [];
    if (r.ui_url)      surfaces.push(`<span class="pill ui">UI</span>`);
    if (r.service_url) surfaces.push(`<span class="pill svc">service</span>`);
    if (r.egg_url)     surfaces.push(`<span class="pill eggs">eggs</span>`);
    const isInstalled = installedIds.has(r.id);
    return `
    <div class="row ${isInstalled ? 'installed' : ''}">
      <div class="head">
        <span class="name">${esc(r.name || r.id)}</span>
        <span class="pub">${esc(r.publisher || '@rapp')}</span>
        <span class="ver">v${esc(r.version || '?')}</span>
      </div>
      <div class="summary">${esc((r.summary || '').slice(0, 240))}</div>
      <div class="pills">
        ${r.category ? `<span class="pill cat">${esc(r.category)}</span>` : ''}
        ${surfaces.join('')}
      </div>
      <div class="actions">
        ${isInstalled
          ? `<button class="danger" onclick='uninstall(${JSON.stringify(r.id)})'>Uninstall</button>`
          : `<button class="primary" onclick='install(${JSON.stringify(r.id)})'>Install</button>`}
      </div>
    </div>`;
  }).join('');
}

async function install(id) {
  toast(`Installing ${id}…`);
  try {
    await api('/api/binder/install', { method: 'POST', body: JSON.stringify({ id }), headers: { 'Content-Type': 'application/json' } });
    toast(`Installed ${id}`, 'ok');
  } catch (e) { toast(`Install failed: ${e.message}`, 'err'); }
  await reload();
}

async function uninstall(id) {
  if (!confirm(`Uninstall ${id}?`)) return;
  try {
    await api('/api/binder/installed/' + encodeURIComponent(id), { method: 'DELETE' });
    toast(`Uninstalled ${id}`, 'ok');
  } catch (e) { toast(`Uninstall failed: ${e.message}`, 'err'); }
  await reload();
}

// ─── helpers ────────────────────────────────────────────────────────────
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg, kind) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (kind || '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2400);
}

// ─── boot ───────────────────────────────────────────────────────────────
reload();
</script>

</body>
</html>
