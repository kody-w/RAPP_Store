<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanban — task board you talk to</title>
<style>
  :root { --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --border:#30363d; --text:#e6edf3; --dim:#8b949e; --accent:#58a6ff; --green:#3fb950; --red:#f85149; --orange:#d29922; --purple:#bc8cff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 0; min-height: 100vh; line-height: 1.5; }
  header { padding: 18px 22px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 5; }
  header h1 { font-size: 16px; font-weight: 700; }
  header .sub { color: var(--dim); font-size: 11px; font-family: ui-monospace, monospace; }
  header .actions { margin-left: auto; display: flex; gap: 8px; }
  button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 7px; cursor: pointer; font: inherit; font-size: 12px; }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.danger  { color: var(--red); border-color: rgba(248,81,73,.3); padding: 2px 7px; font-size: 11px; }
  .new-row { padding: 14px 22px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .new-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: 7px; font: inherit; font-size: 13px; }
  .new-row input:focus { outline: 0; border-color: var(--accent); }
  .new-row select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: 7px; font: inherit; font-size: 13px; }
  .board { padding: 18px 22px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 1400px; margin: 0 auto; }
  @media (max-width: 760px) { .board { grid-template-columns: 1fr; } }
  .col { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; min-height: 200px; }
  .col h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--dim); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .col h2 .count { font-family: ui-monospace, monospace; color: var(--text); }
  .col[data-status="todo"]  h2 .dot { color: var(--dim); }
  .col[data-status="doing"] h2 .dot { color: var(--orange); }
  .col[data-status="done"]  h2 .dot { color: var(--green); }
  .task { background: var(--bg); border: 1px solid var(--border); border-left: 3px solid var(--dim); border-radius: 7px; padding: 10px 12px; margin-bottom: 8px; }
  .col[data-status="doing"] .task { border-left-color: var(--orange); }
  .col[data-status="done"]  .task { border-left-color: var(--green); }
  .task .title { font-size: 13px; font-weight: 600; margin-bottom: 6px; word-break: break-word; }
  .task .meta { font-size: 10px; color: var(--dim); font-family: ui-monospace, monospace; margin-bottom: 8px; }
  .task .actions { display: flex; gap: 4px; flex-wrap: wrap; }
  .task .actions button { padding: 2px 8px; font-size: 11px; }
  .col-empty { color: var(--dim); padding: 14px 8px; text-align: center; font-size: 11px; font-style: italic; }
  .toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 9px 16px; font-size: 12px; opacity: 0; transition: opacity .25s; }
  .toast.show { opacity: 1; }
  .toast.ok  { border-color: var(--green); }
  .toast.err { border-color: var(--red); }
  .ctx-banner { padding: 9px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: 11px; color: var(--dim); }
  .ctx-banner code { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div>
    <h1>🗂️ Kanban</h1>
    <div class="sub">create · move · query — through the agent</div>
  </div>
  <div class="actions">
    <button onclick="loadTasks()">↻ Reload</button>
  </div>
</header>

<div class="ctx-banner" id="ctxBanner"></div>

<form class="new-row" onsubmit="addTask(event)">
  <input id="t-title" placeholder="New task title…" required autocomplete="off" />
  <select id="t-status">
    <option value="todo">Todo</option>
    <option value="doing">Doing</option>
    <option value="done">Done</option>
  </select>
  <button class="primary" type="submit">+ Add</button>
</form>

<div class="board">
  <div class="col" data-status="todo">
    <h2><span><span class="dot">●</span> Todo</span><span class="count" id="cnt-todo">0</span></h2>
    <div id="col-todo"></div>
  </div>
  <div class="col" data-status="doing">
    <h2><span><span class="dot">●</span> Doing</span><span class="count" id="cnt-doing">0</span></h2>
    <div id="col-doing"></div>
  </div>
  <div class="col" data-status="done">
    <h2><span><span class="dot">●</span> Done</span><span class="count" id="cnt-done">0</span></h2>
    <div id="col-done"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

let cartridge = null;
window.addEventListener('message', (ev) => {
  const d = ev.data;
  if (d?.type === 'rapp:cartridge') { cartridge = d; onCartridge(); }
});
window.parent.postMessage({ type: 'rapp:get_cartridge' }, '*');

function onCartridge() {
  const banner = document.getElementById('ctxBanner');
  const t = cartridge?.context?.tether;
  const u = cartridge?.context?.user;
  const parts = [];
  if (u) parts.push(`signed in as <code>@${u.login}</code>`);
  parts.push(t?.active ? `tethered to <code>${t.base}</code>` : `cloud mode`);
  banner.innerHTML = parts.join(' · ');
}

async function invoke(args) {
  return new Promise((resolve, reject) => {
    const id = 'inv-' + Math.random().toString(36).slice(2);
    const handler = (ev) => {
      const d = ev.data;
      if (!d || d.type !== 'rapp:invoke:result' || d.id !== id) return;
      window.removeEventListener('message', handler);
      d.error ? reject(new Error(d.error)) : resolve(d.result);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: 'rapp:invoke', id, args }, '*');
  });
}

async function loadTasks() {
  try {
    const out = await invoke({ action: 'list' });
    const parsed = parseSafe(out, { tasks: [] });
    render(parsed.tasks || []);
  } catch (e) {
    toast(`Couldn't load tasks: ${e.message}`, 'err');
  }
}

function render(tasks) {
  const cols = { todo: [], doing: [], done: [] };
  for (const t of tasks) (cols[t.status] || cols.todo).push(t);
  for (const status of ['todo', 'doing', 'done']) {
    document.getElementById('cnt-' + status).textContent = cols[status].length;
    const root = document.getElementById('col-' + status);
    if (!cols[status].length) {
      root.innerHTML = `<div class="col-empty">empty</div>`;
      continue;
    }
    root.innerHTML = cols[status].map(t => `
      <div class="task">
        <div class="title">${esc(t.title || '')}</div>
        <div class="meta">${esc(t.id || '')}${t.created ? ' · ' + esc(t.created) : ''}</div>
        <div class="actions">
          ${status !== 'todo'  ? `<button onclick='move(${JSON.stringify(t.id)},"todo")'>← Todo</button>` : ''}
          ${status !== 'doing' ? `<button onclick='move(${JSON.stringify(t.id)},"doing")'>Doing</button>` : ''}
          ${status !== 'done'  ? `<button onclick='move(${JSON.stringify(t.id)},"done")'>Done →</button>` : ''}
          <button class="danger" onclick='del(${JSON.stringify(t.id)})'>×</button>
        </div>
      </div>
    `).join('');
  }
}

async function addTask(ev) {
  ev.preventDefault();
  const title = document.getElementById('t-title').value.trim();
  const status = document.getElementById('t-status').value;
  if (!title) return;
  try {
    await invoke({ action: 'create', title, status });
    document.getElementById('t-title').value = '';
    toast('Added', 'ok');
    await loadTasks();
  } catch (e) { toast(`Failed: ${e.message}`, 'err'); }
}

async function move(id, status) {
  try {
    await invoke({ action: 'update', id, status });
    await loadTasks();
  } catch (e) { toast(`Failed: ${e.message}`, 'err'); }
}

async function del(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await invoke({ action: 'delete', id });
    toast('Deleted', 'ok');
    await loadTasks();
  } catch (e) { toast(`Failed: ${e.message}`, 'err'); }
}

function parseSafe(s, fallback) { try { return JSON.parse(s); } catch { return fallback; } }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg, kind) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (kind || '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2400);
}

loadTasks();
</script>

</body>
</html>
